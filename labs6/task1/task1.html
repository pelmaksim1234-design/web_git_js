<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна 6 - Завдання 1</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<header class="site-header">
    <div>
        <h1>Список товарів</h1>
        <p>Додавання, видалення, редагування, фільтрація та сортування товарів.</p>
    </div>
    <div class="total-box">
        <span>Загальна вартість:</span>
        <strong id="totalPrice">0 грн</strong>
    </div>
</header>

<main class="container">
    <section class="controls" aria-label="Фільтрація товарів">
        <h2>Фільтр товарів</h2>
        <div id="filterButtons" class="button-row"></div>
    </section>

    <section class="controls" aria-label="Сортування товарів">
        <h2>Сортування товарів</h2>
        <div id="sortButtons" class="button-row"></div>
    </section>

    <section class="products-section">
        <h2>Товари</h2>
        <p id="emptyText" class="empty-text">Наразі список товарів пустий. Додайте новий товар.</p>
        <div id="productList" class="product-list"></div>
        <button id="addProductBtn" class="main-btn" type="button">Додати новий товар</button>
    </section>
</main>

<div id="productModal" class="modal" hidden>
    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-top">
            <h2 id="modalTitle">Додати товар</h2>
            <button id="closeModalBtn" class="close-btn" type="button" aria-label="Закрити">x</button>
        </div>

        <form id="productForm">
            <input id="oldProductId" type="hidden">

            <label>
                ID товару
                <input id="productId" type="number" min="1" required>
            </label>

            <label>
                Назва товару
                <input id="productName" type="text" minlength="2" maxlength="50" required>
            </label>

            <label>
                Ціна товару
                <input id="productPrice" type="number" min="1" step="0.01" required>
            </label>

            <label>
                Категорія
                <select id="productCategory" required>
                    <option value="Техніка">Техніка</option>
                    <option value="Книги">Книги</option>
                    <option value="Одяг">Одяг</option>
                </select>
            </label>

            <label>
                Зображення товару
                <input id="productImage" type="url" placeholder="https://example.com/photo.jpg" required>
            </label>

            <div class="form-actions">
                <button class="main-btn" type="submit">Зберегти</button>
                <button id="cancelModalBtn" class="light-btn" type="button">Скасувати</button>
            </div>
        </form>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="script/task1.js"></script>
</body>
</html>
