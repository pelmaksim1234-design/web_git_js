<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна 6 - Завдання 2</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<header class="site-header">
    <div>
        <h1>To-do list</h1>
        <p>Простий список завдань з додаванням, редагуванням, видаленням і сортуванням.</p>
    </div>
    <div class="stats">
        <span>Усього: <strong id="allCount">0</strong></span>
        <span>Виконано: <strong id="doneCount">0</strong></span>
    </div>
</header>

<main class="container">
    <section class="block">
        <h2>Нове завдання</h2>
        <form id="taskForm" class="task-form">
            <label>
                Текст завдання
                <input id="taskInput" type="text" minlength="3" maxlength="100" required placeholder="Наприклад: зробити лабораторну">
            </label>
            <button class="main-btn" type="submit">Додати завдання</button>
        </form>
    </section>

    <section class="block">
        <h2>Сортування завдань</h2>
        <div id="sortButtons" class="button-row"></div>
    </section>

    <section class="block">
        <h2>Список завдань</h2>
        <p id="emptyText" class="empty-text">Список завдань порожній. Додайте перше завдання.</p>
        <ul id="taskList" class="task-list"></ul>
    </section>
</main>

<div id="toast" class="toast"></div>

<script src="script/task2.js"></script>
</body>
</html>
